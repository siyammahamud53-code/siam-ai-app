name: siam_ai_app
description: "Siam AI Video & Voice Assistant with YouTube Interface"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  http: ^1.2.0
  # এই ৩টা প্যাকেজ যোগ করা হয়েছে যা লগে মিসিং ছিল:
  speech_to_text: ^6.6.0
  flutter_tts: ^3.8.5
  google_generative_ai: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icons/ragna_avatar.png.jpg
    - assets/icons/maya_avatar.png.jpg
