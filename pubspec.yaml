name: siam_ai_app
description: "Siam AI Video & Voice Assistant with YouTube Interface"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.3.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

# অ্যাপের বাইরের আইকন ফিক্সড (সাধারণ এবং রাউন্ড দুইটাই তৈরি হবে)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.png"
  adaptive_icon_background: "#0A0A0E"
  adaptive_icon_foreground: "assets/icons/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/icons/ragna_avatar.png.jpg
    - assets/icons/maya_avatar.png.jpg
