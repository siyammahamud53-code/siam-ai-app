name: siam_ai_app
description: "Siam AI Voice Assistant Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.png"
  adaptive_icon_background: "#0D0F12"
  adaptive_icon_foreground: "assets/icons/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
