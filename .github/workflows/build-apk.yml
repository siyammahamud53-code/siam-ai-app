name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Re-create Android files
        run: flutter create --org com.aurax --project-name aura_x .

      - name: Generate AURA-X App Logo
        run: |
          python3 -c "
          from PIL import Image, ImageDraw
          img = Image.new('RGB', (512, 512), color='#07090E')
          draw = ImageDraw.Draw(img)
          draw.ellipse([100, 100, 412, 412], outline='#BD00FF', width=20)
          draw.ellipse([180, 180, 332, 332], fill='#00F0FF')
          img.save('android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png')
          "

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-x-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
