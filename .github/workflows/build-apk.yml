name: Build Flutter APK with Icons

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.4'
          channel: 'stable'

      - name: 📦 Get dependencies
        run: flutter pub get

      # ========== 🖼️ Launcher Icon Auto Generator ==========
      - name: 🖼️ Generate Launcher Icons
        run: flutter run flutter_launcher_icons:main

      # ========== 🔨 Build APK Release ==========
      - name: 🔨 Build APK
        run: flutter build apk --release

      # ========== 📤 Upload APK Artifact ==========
      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: aura-x-apk
          path: build/app/outputs/flutter-apk/*.apk
